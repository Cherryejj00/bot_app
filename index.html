<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Оформление заявки</h2>

<label for="service_select">Кто ты есть?</label><br>
<select id="service_select" style="padding: 10px; width: 84%; margin-bottom: 20px; border-radius: 5px; font-size: 16px;">
    <option value="Нефор">Нефор</option>
    <option value="Шиномонтаж">Шиномонтаж 🛞</option>
    <option value="Мойка кузова">Мойка кузова 🧼</option>
</select>
<br>

<label for="user_input">Комментарий:</label><br>
<input type="text" id="user_input" placeholder="Например: приеду к 18:00...">
<br>
<button id="send_btn">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let btn = document.getElementById("send_btn");

        btn.addEventListener("click", function() {
            // 1. Забираем значение из выпадающего списка
            let selectedService = document.getElementById("service_select").value;

            // 2. Забираем текст из поля ввода
            let userComment = document.getElementById("user_input").value;

            // 3. Собираем данные в удобный формат JSON (используем правильные переменные!)

            // Безопасно вытаскиваем данные пользователя, проверяя каждый шаг
            let userId = 0;
            let userNik = "unknown";
            let userFirstName = "unknown"; // <-- Добавили переменную для имени
            let userLastName = "non";

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                if (tg.initDataUnsafe.user.id) userId = tg.initDataUnsafe.user.id;
                if (tg.initDataUnsafe.user.username) userNik = tg.initDataUnsafe.user.username;
                if (tg.initDataUnsafe.user.first_name) userFirstName = tg.initDataUnsafe.user.first_name; // <-- Добавили чтение имени
                if (tg.initDataUnsafe.user.last_name) userLastName = tg.initDataUnsafe.user.last_name;
            }

            // Теперь собираем объект без использования знаков вопроса
            const orderData = {
                service: selectedService,
                comment: userComment,
                user_id: userId,
                username: userNik,
                first_name: userFirstName,
                last_name: userLastName
            }


            // 4. Отправляем данные на наш Python-сервер (добавили /api/order)
            fetch('https://unstirred-sublevel-playing.ngrok-free.dev/api/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => {
                if (response.ok) {
                    alert('Заявка успешно отправлена!');
                    document.getElementById("user_input").value = ''; // Очищаем поле через его ID
                } else {
                    alert('Ошибка при отправке заказа.');
                }
            })
            .catch(error => {
                console.error('Ошибка сети:', error);
                alert('Не удалось связаться с сервером.');
            });
        });
    </script>
</body>
</html>
