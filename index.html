<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Привет! Введи что-нибудь:</h2>

    <input type="text" id="user_input" placeholder="Напиши тут свой текст...">
    <br>
    <button id="send_btn">Отправить в бот</button>

    <script>
        // Инициализируем Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем приложение на весь экран

        let btn = document.getElementById("send_btn");

        // Пишем код на JavaScript: что делать при нажатии на кнопку
        btn.addEventListener("click", function() {
            // Забираем то, что пользователь написал в инпут
            let userText = document.getElementById("user_input").value;

            if (userText.trim() === "") {
                alert("Пожалуйста, введи хоть что-то!");
                return;
            }

            // Отправляем именно этот текст в нашего бота!
            tg.sendData(userText);
        });
    </script>
</body>
</html>
