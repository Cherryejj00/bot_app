<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Оформление заявки</h2>

<label for="service_select">Че надо?</label><br>
<select id="service_select" style="padding: 10px; width: 84%; margin-bottom: 20px; border-radius: 5px; font-size: 16px;">
    <option value="Замена масла">Замена масла</option>
    <option value="Шиномонтаж">Шиномонтаж 🛞</option>
    <option value="Мойка кузова">Мойка кузова 🧼</option>
</select>
<br>
<label for="date_select">Выберите дату:</label><br>
<input type="date" id="date_select" style="padding: 10px; width: 80%; margin-bottom: 20px; border-radius: 5px; font-size: 16px;"><br>

<label>Доступное время:</label><br>
<div id="time_slots" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 84%; margin: 0 auto 20px auto;">
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">10:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">12:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">14:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">16:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">18:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">20:00</button>
</div>
<label for="user_input">Комментарий:</label><br>
<input type="text" id="user_input" placeholder="Например: приеду к 18:00...">
<br>
<button id="send_btn">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        // Находим сегодняшнюю дату и приводим к формату YYYY-MM-DD,
        // который понимает атрибут min у input type="date"
        let today = new Date().toISOString().split('T')[0];

        // Устанавливаем минимально доступную дату в календаре — раньше сегодня выбрать нельзя
        document.getElementById("date_select").min = today;

        let btn = document.getElementById("send_btn");

        let selectedTime = ""; // Переменная для хранения выбранного времени

        // Находим все плиточки времени
        const slots = document.querySelectorAll('.time-slot');
        slots.forEach(slot => {
            slot.addEventListener('click', function() {
                // Сбрасываем цвет у всех плиток
                slots.forEach(s => {
                    s.style.backgroundColor = '#e0e0e0';
                    s.style.color = 'black';
                });
                // Выделяем синим цветом ту, на которую нажали
                this.style.backgroundColor = '#0088cc';
                this.style.color = 'white';
                // Запоминаем выбранное время
                selectedTime = this.innerText;
            });
        });        

        btn.addEventListener("click", function() {
            // 1. Забираем значение из выпадающего списка

            let selectedDate = document.getElementById("date_select").value; // переменная с датой
            let selectedService = document.getElementById("service_select").value;

            // 2. Забираем текст из поля ввода
            let userComment = document.getElementById("user_input").value;

            // 3. Собираем данные в удобный формат JSON (используем правильные переменные!)

            // Безопасно вытаскиваем данные пользователя, проверяя каждый шаг
            let userId = 0;
            let userNik = "unknown";
            let userFirstName = "unknown"; // <-- Добавили переменную для имени
            let userLastName = "non";


            

            if (!selectedDate || !selectedTime) {
                alert("Пожалуйста, выберите дату и время записи!");
                return; // Останавливаем отправку, если клиент что-то забыл указать
            }

            // Теперь собираем объект без использования знаков вопроса
            const orderData = {
                service: selectedService,
                comment: userComment,
                date: selectedDate,
                time: selectedTime,
                init_data: tg.initData
            }


            // 4. Отправляем данные на наш Python-сервер (добавили /api/order)
            fetch('https://unstirred-sublevel-playing.ngrok-free.dev/api/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => {
                if (response.ok) {
                    alert('Заявка успешно отправлена!');
                    document.getElementById("user_input").value = ''; // Очищаем поле через его ID
                } else {
                    alert('Ошибка при отправке заказа.');
                }
            })
            .catch(error => {
                console.error('Ошибка сети:', error);
                alert('Не удалось связаться с сервером.');
            });
        });
    </script>
</body>
</html>
