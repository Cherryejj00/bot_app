<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 20px;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Оформление заявки</h2>

<label for="service_select">Че надо?</label><br>
<select id="service_select" style="padding: 10px; width: 84%; margin-bottom: 20px; border-radius: 5px; font-size: 16px;">
    <option value="Замена масла">Замена масла</option>
    <option value="Шиномонтаж">Шиномонтаж 🛞</option>
    <option value="Мойка кузова">Мойка кузова 🧼</option>
</select>
<br>
<label for="date_select">Выберите дату:</label><br>
<input type="date" id="date_select" style="padding: 10px; width: 80%; margin-bottom: 20px; border-radius: 5px; font-size: 16px;"><br>

<label>Доступное время:</label><br>
<div id="time_slots" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 84%; margin: 0 auto 20px auto;">
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">10:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">12:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">14:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">16:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">18:00</button>
    <button type="button" class="time-slot" style="background-color: #e0e0e0; color: black;">20:00</button>
</div>
<label for="user_input">Комментарий:</label><br>
<input type="text" id="user_input" placeholder="Например: приеду к 18:00...">
<br>
<button id="send_btn">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        let minDate = tomorrow.toISOString().split('T')[0];
        document.getElementById("date_select").min = minDate;

        let btn = document.getElementById("send_btn");
        let selectedTime = "";
        const slots = document.querySelectorAll('.time-slot');

        // Функция обновления занятых слотов — определена до использования
        async function refreshBookedSlots(selectedDate) {
            if (!selectedDate) return;
            slots.forEach(s => {
                s.style.backgroundColor = '#e0e0e0';
                s.style.color = 'black';
                s.disabled = false;
                s.style.opacity = '1';
                s.style.cursor = 'pointer';
            });
            try {
                const response = await fetch(`https://unstirred-sublevel-playing.ngrok-free.dev/api/booked-slots?date=${selectedDate}`);
                const data = await response.json();
                const bookedTimes = data.booked_times;
                slots.forEach(slot => {
                    if (bookedTimes.includes(slot.innerText)) {
                        slot.disabled = true;
                        slot.style.opacity = '0.4';
                        slot.style.cursor = 'not-allowed';
                        slot.style.backgroundColor = '#ccc';
                    }
                });
            } catch (error) {
                console.error('Не удалось загрузить занятые слоты:', error);
            }
        }

        // Обработчик клика по плиткам времени
        slots.forEach(slot => {
            slot.addEventListener('click', function() {
                slots.forEach(s => {
                    s.style.backgroundColor = '#e0e0e0';
                    s.style.color = 'black';
                });
                this.style.backgroundColor = '#0088cc';
                this.style.color = 'white';
                selectedTime = this.innerText;
            });
        });

        // Обработчик смены даты
        document.getElementById("date_select").addEventListener("change", function() {
            selectedTime = "";
            refreshBookedSlots(this.value);
        });

        // Обработчик отправки заказа
        btn.addEventListener("click", function() {
            let selectedDate = document.getElementById("date_select").value;
            let selectedService = document.getElementById("service_select").value;
            let userComment = document.getElementById("user_input").value;

            if (!selectedDate || !selectedTime) {
                alert("Пожалуйста, выберите дату и время записи!");
                return;
            }

            const orderData = {
                service: selectedService,
                comment: userComment,
                date: selectedDate,
                time: selectedTime,
                init_data: tg.initData
            }

            fetch('https://unstirred-sublevel-playing.ngrok-free.dev/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            })
            .then(response => {
                if (response.ok) {
                    alert('Заявка успешно отправлена!');
                    document.getElementById("user_input").value = '';
                    selectedTime = "";
                    refreshBookedSlots(document.getElementById("date_select").value);
                } else {
                    response.json().then(data => {
                        alert('Ошибка: ' + (data.detail || 'не удалось отправить заказ'));
                    });
                }
            })
            .catch(error => {
                console.error('Ошибка сети:', error);
                alert('Не удалось связаться с сервером.');
            });
        });
    </script>
</body>
</html>
